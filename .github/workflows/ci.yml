name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --locked
      - name: Clippy
        run: cargo clippy --locked -- -D warnings
      - name: Test
        run: cargo test --locked
